[Main]
run_type = trainFF
; trajectory_file = ../Ge/train0.traj
trajectory_file = ../TiO2/train1.traj
# scaler_type = STDScaler
scaler_type = NoScaler
energy_training = True
force_training  = True
test_log_interval = 1
epochs_max = 10
ifelectronegativity = True
ifhardness = True
chg_grad = True
Es_frac = 1.0

[Parallelization]
process_num = 5
batch_num_per_proc = 1
thread_num = 1
device_type = CPU

[Fingerprints]
fp_type = BP
; fp_parameter_file = fpParas_Ge.dat 
fp_parameter_file = fpParas_TiO2.dat 
fp_use_existing = False
fp_dir = fingerprints
fp_batch_num = 1
test_fp_dir = test_fingerprints
fp_test_use_existing = False

[MachineLearningModel]
model_type = neural_network
hidden_layers = 2 2
activation_function = tanh

[LossFunction]
# loss_type = RMSE
loss_type = SE
energy_coefficient = 1.0
force_coefficient  = 1.0

[Optimizer]
optimizer_type = LBFGS
learning_rate = 1
# optimizer_type = LBFGSScipy
# optimizer_type = ADAM

[Debug]
init_model_parameters = False
nn_values = False
